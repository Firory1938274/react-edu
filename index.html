<!doctype html>
<!-- Сообщаем браузеру, что основной язык страницы русский. -->
<html lang="ru">
  <!-- В head лежат настройки страницы, которые почти не видны пользователю. -->
  <head>
    <!-- Указываем кодировку, чтобы русские буквы отображались правильно. -->
    <meta charset="UTF-8" />
    <!-- Подключаем иконку вкладки браузера из папки public. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Делаем страницу нормальной ширины на телефонах. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Пишем название вкладки браузера. -->
    <title>React JSON DB</title>
  </head>
  <!-- В body лежит видимая часть страницы. -->
  <body>
    <!-- В этот div React вставит все приложение. -->
    <div id="root"></div>
    <!-- Подключаем главный JavaScript-файл приложения. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
